<?xml version="1.0" encoding="UTF-8"?>
<!--
  Jellyfin icon (approximate fallback).
  Based on https://github.com/jellyfin/jellyfin-ux (CC BY-SA 4.0).
  See: http://creativecommons.org/licenses/by-sa/4.0/

  Structure: three visual elements matching the official icon-transparent.svg
    - Outer rounded triangle boundary  (1st subpath)
    - Middle cutout boundary           (2nd subpath, creates the ring via evenodd)
    - Small inner filled triangle      (separate path)

  To use the exact official icon instead of this fallback, drop a file named
  jellyfin-icon.svg into the enricher data directory (the same place as
  splash.jpg). The /icon route prefers user-provided files.
-->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512" aria-label="Jellyfin">
  <defs>
    <linearGradient id="jf-gradient" gradientUnits="userSpaceOnUse" x1="110.25" y1="213.3" x2="496.14" y2="436.09">
      <stop offset="0" style="stop-color:#AA5CC3"/>
      <stop offset="1" style="stop-color:#00A4DC"/>
    </linearGradient>
  </defs>
  <path
    d="M256,23.3c-61.6,0-259.8,359.4-229.6,420.1s429.3,60,459.2,0S317.6,23.3,256,23.3z M256,85c-48,0-203,280-179,328s335,47,358,0S304,85,256,85z"
    fill="url(#jf-gradient)"
    fill-rule="evenodd"/>
  <path
    d="M256,201.6c-20.4,0-86.2,119.3-76.2,139.4s142.5,19.9,152.4,0S276.5,201.6,256,201.6z"
    fill="url(#jf-gradient)"/>
</svg>
