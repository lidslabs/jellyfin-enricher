name: Build and push image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lidslabs/jellyfin-enricher
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.licenses=MIT
          flavor: |
            latest=false

      - name: Build image locally for smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: enricher:smoketest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — curl_cffi importable and Chrome impersonate target available
        run: |
          set -euo pipefail

          # Belt: curl_cffi imports cleanly inside the image
          docker run --rm --entrypoint python enricher:smoketest \
            -c "import curl_cffi; print(f'curl_cffi {curl_cffi.__version__} importable')"

          # Suspenders: yt-dlp sees Chrome as an available impersonate target.
          # This catches both (a) curl_cffi missing entirely and (b) curl_cffi
          # installed but version-mismatched against yt-dlp's expectations.
          docker run --rm --entrypoint yt-dlp enricher:smoketest \
            --list-impersonate-targets | tee targets.txt

          if grep -qE '^Chrome\s+.*\(unavailable\)' targets.txt; then
            echo "::error::Chrome impersonate target is unavailable — curl_cffi missing or version-mismatched"
            exit 1
          fi
          if ! grep -qE '^Chrome' targets.txt; then
            echo "::error::Chrome impersonate target not present in yt-dlp at all"
            exit 1
          fi

          # Verify Deno is on PATH (yt-dlp's default JS runtime for YouTube)
          docker run --rm --entrypoint deno enricher:smoketest --version

          echo "✓ curl_cffi importable, Chrome impersonate available, Deno present"

      - name: Push image (cache-hit from smoke test build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Detect pre-release
        if: github.ref_type == 'tag'
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(rc|alpha|beta|dev)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          body: |
            ## Pull

                docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            ## Changes

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full history.
